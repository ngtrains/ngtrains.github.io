services:
  jekyll:
    container_name: jekyll-dev
    tty: true
    stdin_open: true
    build: .
    environment:
      - BUNDLE_PATH=/usr/local/bundle
    volumes:
      - ./docs:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    ports:
      - 4000:4000
    working_dir: /srv/jekyll
    command: sh -c "bundle install && bundle exec jekyll serve --host 0.0.0.0 --watch"
volumes:
  bundle_cache: